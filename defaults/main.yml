---
dns_allow_recursion:
  - none
dns_caching_dns: true
dns_options_listen_on:
  - any
dns_options_listen_on_v6:
  - any
dns_pid_file: /run/named/named.pid
dns_port: 53
dns_zones:
  - expire: 2419200
    name: localhost
    records:
      - name: "@"
        type: NS
        value: localhost.
      - name: "@"
        value: 127.0.0.1
      - name: "@"
        type: AAAA
        value: ::1
    refresh: 604800
    retry: 86400
    serial: 1
    soa: localhost
    ttl: 604800
  - name: 127.in-addr.arpa
    records:
      - name: "@"
        type: NS
        value: localhost.
      - name: 1.0.0
        type: PTR
        value: localhost.
    ttl: 604800
  - name: 0.in-addr.arpa
    records:
      - name: "@"
        type: NS
        value: localhost.
  - name: 255.in-addr.arpa
    records:
      - name: "@"
        type: NS
        value: localhost.
  - mx:
      - name: mail1.example.com.
        priority: 10
      - name: mail2.example.com.
        priority: 20
    name: example.com
    ns:
      - name: dns1.example.com.
      - name: dns2.example.com.
    records:
      - name: dns1
        value: 127.0.0.1
      - name: dns2
        value: 127.0.0.1
      - name: www
        value: 127.0.0.1
      - name: dns1
        value: 127.0.0.1
      - name: dns2
        value: 127.0.0.1
      - name: mail1
        value: 127.0.0.1
      - name: mail2
        value: 127.0.0.1
      - name: ldap1
        value: 127.0.0.1
    srv:
      - name: _kerberos-master._tcp.example.com.
        port: 88
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _kerberos-master._udp.example.com.
        port: 88
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _kerberos._tcp.example.com.
        port: 88
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _kerberos._udp.example.com.
        port: 88
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _kpasswd._tcp.example.com.
        port: 464
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _kpasswd._udp.example.com.
        port: 464
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
      - name: _ldap._tcp.example.com.
        port: 389
        priority: 0
        ttl: 3600
        value: ldap1.example.com.
        weight: 100
    ttl: 604800
    txt:
      - name: _kerberos.example.com.
        ttl: 3600
        value: EXAMPLE.COM
    uri:
      - name: _kerberos.example.com.
        priority: 0
        value: "krb5srv:m:tcp:ldap1.example.com."
        weight: 100
      - name: _kerberos.example.com.
        priority: 0
        value: "krb5srv:m:udp:ldap1.example.com."
        weight: 100
      - name: _kpasswd.example.com.
        priority: 0
        value: "krb5srv:m:tcp:ldap1.example.com."
        weight: 100
      - name: _kpasswd.example.com.
        priority: 0
        value: "krb5srv:m:udp:ldap1.example.com."
        weight: 100
  - dns_zone_forwarders:
      - 1.1.1.1
      - 8.8.8.8
    name: forwarded.example.com
    type: forward

# secondary configuration example:
